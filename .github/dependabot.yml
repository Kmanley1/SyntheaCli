version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - nuget
    groups:
      xunit:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
    ignore:
      # The 2.0.0-beta4 -> 2.0.x GA jump rewrites the InvocationContext /
      # SetHandler / GetValueForOption / IsRequired API surface used in
      # RunCommand.cs. Tracked separately as design-review finding A-15;
      # remove this entry when that migration commit lands.
      - dependency-name: "System.CommandLine"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
    labels:
      - dependencies
      - github-actions
