name: Publish Docker image

# Builds the air-gapped container image (self-contained CLI + baked Synthea JAR)
# and pushes it to GitHub Container Registry. Fires on the same v* tags that
# drive the NuGet publish, plus a manual trigger that lets you pin which
# Synthea release gets baked in.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      synthea_version:
        description: 'Synthea release to bake (tag like v3.3.0, or "latest")'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kmanley1/synthea-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SYNTHEA_VERSION=${{ github.event.inputs.synthea_version || 'latest' }}
